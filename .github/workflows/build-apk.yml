name: Build APK

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Tag to publish as a GitHub Release (e.g. v1.0). Leave empty to just build."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: echonote-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true

      - name: Create GitHub Release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.release_version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_version }}
          target_commitish: ${{ github.sha }}
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
